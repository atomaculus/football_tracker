name: Close Signups

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  close-signups:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger signup closure endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_BASE_URL or CRON_SECRET secret."
            exit 1
          fi

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/close-signups"
